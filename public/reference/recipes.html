<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Recipes</title>
    <link rel="stylesheet" type="text/css" href="reference-styles.css">

    <style>
      details > summary {
        list-style: none; /* remove default marker */
        cursor: pointer;
        position: relative;
      }

      details > summary::before {
        content: "▸";
        display: inline-block;
        margin-right: 0.5rem;
        transition: transform 0.15s ease;
        color: #666;
      }

      details[open] > summary::before {
        transform: rotate(90deg);
      }

      details[open] > summary {
        background-color: #f6f7f8;
      }

      .batch-row[data-status="depleted"],
      .batch-row[data-status="scrap"] {
        opacity: 0.6;
      }

    </style>
  </head>

  <body data-page="recipes">
    <header>
      <h1>Рецепты</h1>
      <a href="../index.html">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M3 11l9-8 9 8v9a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z"
            fill="currentColor"/>
        </svg>
      </a>
    </header>

    <!-- Enter opens the form and copies the name into it -->
    <input
      id="recipe-name"
      type="text"
      name="name"
      class="add-user"
      placeholder="+ Добавить рецепт"
      autocomplete="off"
      required
    />

    <!-- Form hidden by default; shown on create/edit -->
    <form name="recipe-form" autocomplete="off" hidden>

      <!-- FormData ignores fields without `name` -->

      <fieldset id="recipe-meta">
        <legend>Метаданные</legend>

        <label for="recipe-created-by">Кто добавил</label>
        <select id="recipe-created-by" name="created_by" required>
          <option value="">— выбрать пользователя —</option>
        </select>
        <a href="reference/users.html" target="_blank" class="ref-link">
          Управление пользователями
        </a>
      </fieldset>

      <fieldset id="recipe-details">
        <legend>Описание рецепта</legend>

        <!-- Name copied here on create / "Enter" -->
        <input
          type="text"
          name="name"
          id="recipe-name-input"
          required
          hidden
        />
        <h2></h2>

        <label for="recipe-variant">Вариант/версия</label>
        <input
          id="recipe-variant"
          type="text"
          name="variant_label"
          placeholder="A / B / low binder / v2"
        />

        <label for="projectSelect">Проект</label>
        <select id="projectSelect" name="project_id" required>
          <option value="">— выбрать проект —</option>
        </select>

        <label for="recipe-role">Роль электрода</label>
        <select id="recipe-role" name="role" required>
          <option value="">— выбрать —</option>
          <option value="cathode">катод</option>
          <option value="anode">анод</option>
        </select><br>

        <label for="recipe-notes">Комментарии</label>
        <textarea
          id="recipe-notes"
          name="notes"
          rows="3"
          placeholder="Кратко: что это за рецепт и чем отличается"
        ></textarea>
      </fieldset>

      <fieldset id="recipe-composition">
        <legend>Состав рецепта</legend>
        <div class="recipe-header">
          <span>Компонент</span>
          <span>Код материала</span>
          <span>m, г</span>
          <span>V, мл</span>
        </div>

        <div id="recipe-lines-rows">

          <div class="recipe-line-row" data-index="0">

            <!-- Material -->
            <select class="material-select" data-field="material_id">
              <option value="">Материал</option>
            </select>

            <!-- Role (default from material, editable) -->
            <select class="role-select" data-field="recipe_role">
              <option value="active">Активный материал</option>
              <option value="binder">Связующее</option>
              <option value="additive">Проводящая добавка</option>
              <option value="solvent">Растворитель</option>
            </select>

            <!-- Measure mode -->
            <div class="measure-mode">
              <label>
                <input type="radio" name="measure_mode_0" value="mass" checked>
                m, г
              </label>
              <label>
                <input type="radio" name="measure_mode_0" value="volume">
                V, мл
              </label>
            </div>

            <!-- Targets -->
            <input
              type="number"
              step="0.0001"
              placeholder="m, г"
              data-field="target_mass_g"
            >

            <input
              type="number"
              step="0.001"
              placeholder="V, мл"
              data-field="target_volume_ml"
              disabled
            >
          </div>
        </div>

        <button type="button" id="add-recipe-line">Добавить компонент</button>        
      </fieldset>

      <button id="saveBtn" type="button">Сохранить запись</button>
      <button id="clearBtn" type="button">Очистить форму</button><br>
    </form>

    <div class="status-feedback" aria-live="polite"></div>
    <ul id="recipesList" class="users-list"></ul>

    <script>

      // -------- State and helpers --------

      const addInput = document.getElementById('recipe-name');
      const nameInput = document.getElementById('recipe-name-input');
      const form = document.forms['recipe-form'];
      const title = form.querySelector('h2');
      const saveBtn = document.getElementById('saveBtn');
      const clearBtn = document.getElementById('clearBtn');
      const recipesList = document.getElementById('recipesList');
      const createdBySelect = document.getElementById('recipe-created-by');

      const projectSelect = document.getElementById('projectSelect');
      const addRecipeLine = document.getElementById('add-recipe-line');

      let mode = null;       // 'create' | 'edit'
      let currentId = null;
      let recipeLines = [];

      function showForm() {
        form.hidden = false;
        addInput.disabled = true;
      }

      function hideForm() {
        form.hidden = true;
        addInput.disabled = false;
      }

      function resetForm() {
        form.reset();

        title.textContent = '';
        title.hidden = false;
        nameInput.hidden = true;

        addInput.value = '';
        addInput.blur();

        mode = null;
        currentId = null;

        hideForm();
        clearRecipeLines();

      }

      function formDataToObject(form) {
        return Object.fromEntries(new FormData(form));
      }


      // -------- API helpers --------
      
      async function fetchAllRecipes() {
        const res = await fetch('/api/recipes');
        return res.json();
      }

      async function fetchProjects() {
        const res = await fetch('/api/projects');
        return res.json();
      }

      async function fetchMaterials() {
        const res = await fetch('/api/materials');
        return res.json();
      }

      async function loadRecipes() {
        const recipes = await fetchAllRecipes();
        renderRecipes(recipes);
      }

      async function loadProjects() {
        const res = await fetch('/api/projects');
        const projects = await res.json();

        projectSelect.innerHTML =
          '<option value="">— выбрать проект —</option>';

        projects.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.project_id;
          opt.textContent = p.name;
          projectSelect.appendChild(opt);
        });
      }

      async function loadUsers() {
        const res = await fetch('/api/users');
        const users = await res.json();

        createdBySelect.innerHTML =
          '<option value="">— выбрать пользователя —</option>';

        users
          .filter(u => u.active)
          .forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.user_id;
            opt.textContent = u.name;
            createdBySelect.appendChild(opt);
          });
      }

      async function createRecipe(data) {
        const res = await fetch('/api/recipes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Ошибка сохранения рецепта');
        }

        return res.json();
      }

      // This is where things start to get different

      async function updateRecipe(id, data) {
        const res = await fetch(`/api/recipes/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка обновления');
        }

        return res.json();
      }

      async function deleteRecipe(id) {
        const res = await fetch(`/api/recipes/${id}`, {
          method: 'DELETE'
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Ошибка удаления рецепта');
        }
      }

      async function duplicateRecipe(id, createdBy) {
        const res = await fetch(`/api/recipes/${id}/duplicate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ created_by: createdBy })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Ошибка дублирования рецепта');
        }

        return res.json();
      }


      async function fetchRecipeLines (recipeId) {
        const res = await fetch(`/api/recipes/${recipeId}/lines`);
        if (!res.ok) throw new Error('Ошибка загрузки составляющих');
        return res.json();
      }

      async function populateMaterialSelect(row) {
        const select = row.querySelector('.material-select');
        if (!select) return;

        const materials = await fetchMaterials();

        select.innerHTML = '<option value="">Материал</option>';

        materials.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.material_id;
          opt.textContent = m.name;
          opt.dataset.defaultRole = m.default_role || '';
          select.appendChild(opt);
        });

        select.addEventListener('change', () => {
          const roleSelect = row.querySelector('.role-select');

          if (roleSelect?.dataset.locked === 'true') return;

          const chosen = select.selectedOptions[0];
          if (!chosen || !chosen.dataset.defaultRole) return;

          const mapRole = (r) => {
            if (r === 'conductive_additive') return 'additive';
            return r;
          };

          roleSelect.value = mapRole(chosen.dataset.defaultRole);
        });
      }


      // -------- Other helpers --------

      function duplicateRecipeUI(recipe) {
        mode = 'create';
        currentId = null;

        showForm();

        const copyName = recipe.name + ' (копия)';
        title.textContent = copyName;
        nameInput.value = copyName;

        form.elements['project_id'].value = recipe.project_id || '';
        form.elements['role'].value = recipe.role || '';
        form.elements['variant_label'].value = recipe.variant_label || '';
        form.elements['notes'].value = recipe.notes || '';

        // created_by must be re-selected, same rule as Projects
        createdBySelect.value = '';

        // copy recipe lines
        fetchRecipeLines(recipe.tape_recipe_id)
          .then(lines => {
            renderRecipeLinesFromData(lines);
          })
          .catch(() => {
            showStatus('Ошибка загрузки состава рецепта', true);
          });
      }

      function wireMeasureMode(row) {
        const radios = row.querySelectorAll('input[type="radio"]');
        const massInput = row.querySelector('[data-field="target_mass_g"]');
        const volInput  = row.querySelector('[data-field="target_volume_ml"]');

        function update() {
          const mode = row.querySelector('input[type="radio"]:checked')?.value;

          if (mode === 'mass') {
            massInput.disabled = false;
            volInput.disabled = true;
            volInput.value = '';
          } else if (mode === 'volume') {
            volInput.disabled = false;
            massInput.disabled = true;
            massInput.value = '';
          }
        }

        radios.forEach(r => r.addEventListener('change', update));
        update(); // initial state
      }

      function createRecipeLineRow(index) {
        const row = document.createElement('div');
        row.className = 'recipe-line-row';
        row.dataset.index = index;

        row.innerHTML = `
          <select class="material-select" data-field="material_id">
            <option value="">Материал</option>
          </select>

          <select class="role-select" data-field="recipe_role">
            <option value="active">Активный компонент</option>
            <option value="binder">Связующее</option>
            <option value="additive">Проводящая добавка</option>
            <option value="solvent">Растворитель</option>
          </select>

          <div class="measure-mode">
            <label>
              <input type="radio" name="measure_mode_${index}" value="mass" checked>
              m, г
            </label>
            <label>
              <input type="radio" name="measure_mode_${index}" value="volume">
              V, мл
            </label>
          </div>

          <input type="number" step="0.0001" placeholder="m, г" data-field="target_mass_g">
          <input type="number" step="0.001"  placeholder="V, мл" data-field="target_volume_ml" disabled>

          <button type="button" class="delete-line">🗑</button>
        `;

        // wire behaviors
        wireMeasureMode(row);

        row.querySelector('.delete-line').addEventListener('click', () => {
          row.remove();
        });

        return row;
      }

      function collectRecipeLinesFromDOM() {
        const rows = document.querySelectorAll('.recipe-line-row');
        const lines = [];

        rows.forEach(row => {
          const materialId = Number(
            row.querySelector('[data-field="material_id"]')?.value
          );

          const recipeRole =
            row.querySelector('[data-field="recipe_role"]')?.value || null;

          const mode =
            row.querySelector('input[type="radio"]:checked')?.value;

          const massInput =
            row.querySelector('[data-field="target_mass_g"]');

          const volInput =
            row.querySelector('[data-field="target_volume_ml"]');

          const target_mass_g =
            mode === 'mass' && massInput && massInput.value !== ''
              ? Number(massInput.value)
              : null;

          const target_volume_ml =
            mode === 'volume' && volInput && volInput.value !== ''
              ? Number(volInput.value)
              : null;

          // skip completely empty rows
          if (!materialId) return;

          lines.push({
            material_id: materialId,
            recipe_role: recipeRole,
            measure_mode: mode,
            target_mass_g,
            target_volume_ml
          });
        });

        return lines;
      }

      function clearRecipeLines() {
        const container = document.getElementById('recipe-lines-rows');
        container.innerHTML = '';
      }


      // -------- Rendering --------

      function renderRecipes(recipes) {
        recipesList.innerHTML = '';

        recipes.forEach(r => {
          const li = document.createElement('li');
          li.className = 'user-row';

          const info = document.createElement('div');
          info.className = 'user-info';

          const nameSpan = document.createElement('span');
          nameSpan.textContent = r.name;

          const roleSpan = document.createElement('span');
          roleSpan.textContent = r.role === 'cathode' ? 'катод' : 'анод';

          const variantSpan = document.createElement('span');
          variantSpan.textContent = r.variant_label || '';

          info.appendChild(nameSpan);
          info.appendChild(roleSpan);
          info.appendChild(variantSpan);

          const actions = document.createElement('div');
          actions.className = 'actions';

          const duplicateBtn = document.createElement('button');
          duplicateBtn.textContent = '📄';
          duplicateBtn.title = 'Дублировать';

          duplicateBtn.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            duplicateRecipeUI(r);
          };

          // ✏️ EDIT
          const editBtn = document.createElement('button');
          editBtn.textContent = '✏️';
          editBtn.title = 'Редактировать';
          editBtn.onclick = async (e) => {
            e.preventDefault();
            e.stopPropagation();

            mode = 'edit';
            currentId = r.tape_recipe_id;

            showForm();

            title.textContent = r.name;
            nameInput.value = r.name;

            form.elements['project_id'].value = r.project_id || '';
            form.elements['created_by'].value = r.created_by || '';
            form.elements['role'].value = r.role || '';
            form.elements['variant_label'].value = r.variant_label || '';
            form.elements['notes'].value = r.notes || '';

            const lines = await fetchRecipeLines(r.tape_recipe_id);
            renderRecipeLinesFromData(lines);
          };

          // 🗑 DELETE
          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = '🗑';
          deleteBtn.title = 'Удалить';
          deleteBtn.onclick = async (e) => {
            e.preventDefault();
            e.stopPropagation();

            if (!confirm(`Удалить рецепт "${r.name}"?`)) return;

            try {
              await deleteRecipe(r.tape_recipe_id);
              showStatus('Рецепт удалён');
              loadRecipes();
            } catch (err) {
              showStatus(err.message, true);
            }
          };

          actions.appendChild(editBtn);
          actions.appendChild(duplicateBtn);
          actions.appendChild(deleteBtn);

          li.appendChild(info);
          li.appendChild(actions);

          recipesList.appendChild(li);
        });
      }

      function renderRecipeLinesFromData(lines) {
        if (!Array.isArray(lines)) return;

        const container = document.getElementById('recipe-lines-rows');
        container.innerHTML = '';

        lines.forEach((line, index) => {
          const row = createRecipeLineRow(index);
          container.appendChild(row);

          // set values
          const materialSelect = row.querySelector('[data-field="material_id"]');

          populateMaterialSelect(row).then(() => {
            materialSelect.value = line.material_id;
          });

          const roleSelect = row.querySelector('[data-field="recipe_role"]');
          roleSelect.value = line.recipe_role;
          roleSelect.dataset.locked = 'true';

          // set measure mode
          const radio = row.querySelector(
            `input[type="radio"][value="${line.measure_mode}"]`
          );
          if (radio) {
            radio.checked = true;
          }

          // apply mode toggle AFTER radio state is set
          wireMeasureMode(row);

          // set targets
          if (line.measure_mode === 'mass') {
            row.querySelector('[data-field="target_mass_g"]').value =
              line.target_mass_g ?? '';
          } else if (line.measure_mode === 'volume') {
            row.querySelector('[data-field="target_volume_ml"]').value =
              line.target_volume_ml ?? '';
          }
        });
      }

      // -------- Status helper --------

      const statusBox = document.querySelector('.status-feedback');

      function showStatus(msg, isError = false) {
        statusBox.textContent = msg;
        statusBox.style.color = isError ? '#b00020' : 'darkcyan';

        setTimeout(() => {
          statusBox.textContent = '';
        }, 1000);
      }


      // -------- Events --------

      document.addEventListener('DOMContentLoaded', async () => {
        const firstRow = document.querySelector('.recipe-line-row');
        if (firstRow) {
          await populateMaterialSelect(firstRow);
        }
      });

      addRecipeLine.addEventListener ('click', (e) => {
        const container = document.getElementById('recipe-lines-rows');
        const index = container.children.length;
        container.appendChild(createRecipeLineRow(index));
      });

      addInput.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;

        e.preventDefault();
        if (!form.hidden) return;

        const name = addInput.value.trim();
        if (!name) return;

        mode = 'create';
        currentId = null;

        title.textContent = name;
        nameInput.value = name;

        showForm();
        clearRecipeLines();

        addInput.value = '';
      });

      function validateRequiredFields() {
        let missing = [];

        projectSelect.classList.remove('required-missing');
        createdBySelect.classList.remove('required-missing');

        if (!projectSelect.value) {
          missing.push('Проект');
          projectSelect.classList.add('required-missing');
        }

        if (!createdBySelect.value) {
          missing.push('Кто добавил');
          createdBySelect.classList.add('required-missing');
        }

        if (missing.length) {
          showStatus(
            'Заполните обязательные поля: ' + missing.join(', '),
            true
          );
          return false;
        }

        return true;
      }

      function validateRecipeLines() {
        const rows = document.querySelectorAll('.recipe-line-row');
        if (rows.length === 0) {
          alert('Добавьте хотя бы один компонент');
          return false;
        }

        for (const row of rows) {
          const materialId = row.querySelector('[data-field="material_id"]')?.value;
          if (!materialId) {
            alert('Выберите материал для каждого компонента');
            return false;
          }

          const mode = row.querySelector('input[type="radio"]:checked')?.value;
          const mass = row.querySelector('[data-field="target_mass_g"]')?.value;
          const vol  = row.querySelector('[data-field="target_volume_ml"]')?.value;

          if (mode === 'mass') {
            if (!mass || Number(mass) <= 0) {
              alert('Для режима массы укажите m, г (> 0)');
              return false;
            }
          } else if (mode === 'volume') {
            if (!vol || Number(vol) <= 0) {
              alert('Для режима объёма укажите V, мл (> 0)');
              return false;
            }
          } else {
            alert('Выберите режим измерения (масса или объём)');
            return false;
          }
        }

        return true;
      }


      saveBtn.addEventListener('click', async () => {
        if (!mode) return;

        if (!validateRequiredFields()) return;
        if (!validateRecipeLines()) return;

        const data = {
          project_id: Number(form.elements.project_id.value),
          role: form.elements.role.value,
          name: nameInput.value,
          variant_label: form.elements.variant_label.value || null,
          notes: form.elements.notes.value || null,
          created_by: Number(form.elements.created_by.value),
          lines: collectRecipeLinesFromDOM()
        };

        try {
          if (mode === 'create') {
            await createRecipe(data);
            showStatus('Рецепт сохранён');
          } else if (mode === 'edit') {
            await updateRecipe(currentId, data);
            showStatus('Изменения сохранены');
          }

          resetForm();
          loadRecipes();
        } catch (err) {
          showStatus(err.message, true);
        }
      });

      clearBtn.addEventListener('click', resetForm);
      createdBySelect.addEventListener('focus', loadUsers);

      // ------ name: editable ------
      title.addEventListener('click', () => {
        nameInput.hidden = false;
        title.hidden = true;
        nameInput.focus();
      });

      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          nameInput.blur();
        }
      });

      nameInput.addEventListener('blur', () => {
        const val = nameInput.value.trim();
        if (!val) return;

        title.textContent = val;
        title.hidden = false;
        nameInput.hidden = true;
      });

      // -------- Init --------

      hideForm();
      loadProjects();
      loadUsers();
      loadRecipes();

    </script>
  </body>
</html>
