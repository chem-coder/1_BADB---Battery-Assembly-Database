<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta 
      name="viewport" 
      content="width=device-width, initial-scale=1.0" 
    />
    <title>Materials</title>
    <link rel="stylesheet" type="text/css" href="reference-styles.css">
    
    <style>
      details > summary {
        list-style: none; /* remove default marker */
        cursor: pointer;
        position: relative;
      }

      details > summary::before {
        content: "▸";
        display: inline-block;
        margin-right: 0.5rem;
        transition: transform 0.15s ease;
        color: #666;
      }

      details[open] > summary::before {
        transform: rotate(90deg);
      }

      details[open] > summary {
        background-color: #f6f7f8;
      }

      .batch-row[data-status="depleted"],
      .batch-row[data-status="scrap"] {
        opacity: 0.6;
      }

    </style>
  </head>

  <body data-page="materials">
    <header>
      <h1>Материалы</h1>
      <a href="../index.html"><svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M3 11l9-8 9 8v9a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z" fill="currentColor"/></svg>
      </a>    
    </header>
    
    <!-- Enter opens the form and copies the name into it -->
    <input
      id="material-name"
      type="text"
      name="name"
      class="add-user"
      placeholder="+ Добавить материал"
      autocomplete="off"
      required
    />

    <!-- Form hidden by default; shown on create/edit -->
    <form name="material-form" autocomplete="off" hidden>

      <!-- FormData ignores fields without `name` -->

      <fieldset id="material-meta">
        <legend>Метаданные</legend>

        <label for="material-created-by">Кто добавил</label>
        <select id="material-created-by" name="created_by" required>
          <option value="">— выбрать пользователя —</option>
        </select>
        <a href="./users.html" target="_blank" class="ref-link">
          Управление пользователями
        </a>
      </fieldset>

      <fieldset id="material-details">
        
        <!-- Name copied here on create / "Enter" -->
        <input
          type="text"
          name="name"
          id="material-name-input"
          required
          hidden
        />
        <h2></h2>

        <label for="supplier">Поставщик</label>
        <input type="text" name="supplier" id="supplier"><br>

        <label for="brand">Бренд/Марка/Грейд</label>
        <input type="text" name="brand" id="brand"><br>

        <label for="default_role">Роль по умолчанию</label>
        <select name="default_role">
          <option value="active">активный компонент</option>
          <option value="binder">связующее вещество</option>
          <option value="conductive_additive">проводящая добавка</option>
          <option value="solvent">растворитель</option>
          <option value="other">другое</option>
        </select><br>

        <label for="exclude_from_composition">Исключать из расчёта состава?</label>
        <select name="exclude_from_composition">
          <option value="false">Нет</option>
          <option value="true" default>Да</option>
        </select><br>

        <label for="material-comments">Комментарии </label><br>
        <textarea
          id="material-comments"
          name="comments"
          rows="3"
          cols="50"
          placeholder="Описание материала, комментарии, примечания и т.п."
        ></textarea>
      </fieldset>

      <button id="saveBtn" type="button">Сохранить запись</button>
      <button id="clearBtn" type="button">Очистить форму</button><br>

    </form>
    
    <div class="status-feedback" aria-live="polite"></div>
    <ul id="materialsList" class="users-list"></ul>

    <script>

      // -------- State and helpers --------
      
      const addInput = document.getElementById('material-name');
      const nameInput = document.getElementById('material-name-input');
      const form = document.forms['material-form'];
      const title = form.querySelector('h2');
      const saveBtn = document.getElementById('saveBtn');
      const clearBtn = document.getElementById('clearBtn');
      const createdBySelect = document.getElementById('material-created-by');

      const materialsList = document.getElementById('materialsList');

      const BATCH_STATUS_LABELS_RU = {
        available: 'доступна',
        depleted: 'израсходована',
        scrap: 'списана'
      };

      let mode = null;       // 'create' | 'edit'
      let currentId = null;

      function showForm() {
        form.hidden = false;
        addInput.disabled = true;
      }

      function hideForm() {
        form.hidden = true;
        addInput.disabled = false;
      }

      function resetForm() {
        form.reset();
        title.textContent = '';
        mode = null;
        currentId = null;
        hideForm();
      }

      function formDataToObject(form) {
        return Object.fromEntries(new FormData(form));
      }

      
      // -------- API helpers --------

      async function fetchMaterials() {
        const res = await fetch('/api/materials');
        return res.json();
      }

      async function createMaterial(data) {
        const res = await fetch('/api/materials', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Ошибка сохранения');
        }

        return res.json();
      }

      async function updateMaterial(id, data) {
        const res = await fetch(`/api/materials/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка обновления');
        }

        return res.json();
      }

      async function deleteMaterial(id) {
        const res = await fetch(`/api/materials/${id}`, { 
          method: 'DELETE' 
        });
        
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Ошибка удаления');
        }
      }

      async function fetchBatches(materialId) {
        const res = await fetch(`/api/materials/${materialId}/batches`);
        if (!res.ok) throw new Error('Ошибка загрузки партий');
        return res.json();
      }

      async function createBatch(materialId, data) {
        const res = await fetch(`/api/materials/${materialId}/batches`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка сохранения партии');
        }

        return res.json();
      }

      async function updateBatchStatus(batchId, status) {
        const res = await fetch(`/api/material-batches/${batchId}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка обновления статуса');
        }

        return res.json();
      }

      async function deleteBatch(batchId) {
        const res = await fetch(`/api/material-batches/${batchId}`, {
          method: 'DELETE'
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка удаления партии');
        }
      }
      
      
      // -------- Rendering --------    

      function renderMaterials(materials) {
        materialsList.innerHTML = '';

        materials.forEach(m => {
          const li = document.createElement('li');

          const details = document.createElement('details');

          /* ---------- SUMMARY (material row) ---------- */ 

          const summary = document.createElement('summary');
          summary.className = 'user-row';

          summary.addEventListener('click', (e) => {
            if (e.target.closest('button')) {
              e.preventDefault();
            }
          });

          const info = document.createElement('div');
          info.className = 'user-info';

          const nameSpan = document.createElement('span');
          nameSpan.textContent = m.name;

          const supplier = document.createElement('span');
          supplier.textContent = m.supplier || '';

          const brandSpan = document.createElement('span');
          brandSpan.textContent = m.brand || '';

          const ROLE_LABELS_RU = {
            active: 'активный компонент',
            binder: 'связующее вещество',
            conductive_additive: 'проводящая добавка',
            solvent: 'растворитель',
            other: 'другое'
          };

          const roleSpan = document.createElement('span');
          roleSpan.textContent = ROLE_LABELS_RU[m.default_role] || m.default_role;

          info.appendChild(nameSpan);
          info.appendChild(supplier);
          info.appendChild(brandSpan);
          info.appendChild(roleSpan);

          const actions = document.createElement('div');
          actions.className = 'actions';

          const editBtn = document.createElement('button');
          editBtn.textContent = '✏️';
          editBtn.title = 'Редактировать';
          editBtn.onclick = (e) => {
            e.preventDefault(); // prevent details toggle
            e.stopPropagation();
  
            mode = 'edit';
            currentId = m.material_id;
            showForm();

            // title + name
            title.textContent = m.name;
            nameInput.value = m.name;

            // Populate form with DB values (apply defaults for NULLs)
            form.elements['created_by'].value = m.created_by || '';
            form.elements['supplier'].value = m.supplier || '';
            form.elements['brand'].value = m.brand || '';
            form.elements['default_role'].value = m.default_role || 'active';
            form.elements['exclude_from_composition'].value = m.exclude_from_composition ? 'true' : 'false';
            form.elements['comments'].value = m.comments || '';

            // user (if present in list)
            if (m.created_by) {
              createdBySelect.value = m.created_by;
            }
          };

          const duplicateBtn = document.createElement('button');
          duplicateBtn.textContent = '📄';
          duplicateBtn.title = 'Дублировать';
          duplicateBtn.onclick = (e) => {
            e.preventDefault(); // prevent details toggle
            e.stopPropagation();
            duplicateMaterial(m);
          };
          
          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = '🗑';
          deleteBtn.onclick = async (e) => {
            e.preventDefault(); // prevent details toggle
            e.stopPropagation();

            if (!confirm(`Удалить материал "${m.name}"?`)) return;
            await deleteMaterial(m.material_id);
            loadMaterials();
          };

          actions.appendChild(editBtn);
          actions.appendChild(duplicateBtn);
          actions.appendChild(deleteBtn);

          summary.appendChild(info);
          summary.appendChild(actions);

          /* ---------- DETAILS BODY (future batches) ---------- */

          const detailsBody = document.createElement('div');
          detailsBody.className = 'material-details';

          // ---- batches list ----
          const batchList = document.createElement('ul');
          batchList.className = 'batch-list';

          // ---- add batch button ----
          const addBatchBtn = document.createElement('button');
          addBatchBtn.type = 'button';
          addBatchBtn.className = 'add-batch-btn';
          addBatchBtn.textContent = '+ Добавить партию';

          // ---- batch form (hidden for now) ----
          const batchForm = document.createElement('form');
          batchForm.className = 'batch-form';
          batchForm.hidden = true;
          batchForm.innerHTML = `
            <input type="text" name="batch_code" placeholder="Код партии" required>
            <input type="text" name="supplier_lot" placeholder="Партия поставщика">
            <textarea name="comments" placeholder="Комментарии"></textarea>
            <input
              type="url"
              name="passport_file"
              placeholder="Ссылка на паспорт партии (необязательно)"
            >

            <div class="form-actions">
              <button type="button" class="save-batch">Сохранить</button>
              <button type="button" class="clear-batch">Очистить</button>
            </div>
          `;

          // ---- + Add Batch button behavior ----
          addBatchBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();

            batchForm.hidden = false;
            addBatchBtn.hidden = true;
          });

          // ---- Clear / hide batch form ----
          batchForm.addEventListener('click', (e) => {
            if (!e.target.classList.contains('clear-batch')) return;

            e.preventDefault();
            batchForm.reset?.();   // safe even if empty
            batchForm.hidden = true;
            addBatchBtn.hidden = false;
          });

          // ---- Save batch ----
          batchForm.addEventListener('click', async (e) => {
            if (!e.target.classList.contains('save-batch')) return;

            e.preventDefault();

            const formData = new FormData(batchForm);
            const payload = Object.fromEntries(formData.entries());

            if (!payload.batch_code || !payload.batch_code.trim()) {
              alert('Код партии обязателен');
              return;
            }

            try {
              const newBatch = await createBatch(m.material_id, payload);

              // remove "Партий пока нет"
              const muted = batchList.querySelector('.muted');
              if (muted) muted.remove();

              // prepend new batch
              const row = document.createElement('li');
              row.className = 'batch-row';
              row.dataset.status = newBatch.status;

              const codeSpan = document.createElement('span');
              codeSpan.textContent = newBatch.batch_code;

              const lotSpan = document.createElement('span');
              lotSpan.textContent = newBatch.supplier_lot || '';

              const statusSpan = document.createElement('span');
              statusSpan.textContent = BATCH_STATUS_LABELS_RU[newBatch.status] || newBatch.status;

              row.appendChild(codeSpan);
              row.appendChild(lotSpan);
              row.appendChild(statusSpan);

              // 📎 passport link (POST-created row)
              if (newBatch.passport_file) {
                const link = document.createElement('a');
                link.href = newBatch.passport_file;
                link.textContent = '📎 паспорт';
                link.target = '_blank';
                link.rel = 'noopener';
                row.appendChild(link);
              }

              // ✅ INSERTED HERE: status change button (POST-created rows)
              if (newBatch.status === 'available') {
                const writeOffBtn = document.createElement('button');
                writeOffBtn.type = 'button';
                writeOffBtn.textContent = 'Списать';

                writeOffBtn.onclick = async (e) => {
                  e.preventDefault();
                  e.stopPropagation();

                  const ok = confirm(
                      'Списать партию?\nЭто действие нельзя отменить.'
                    );
                  if (!ok) return;

                  try {
                    const updated = await updateBatchStatus(newBatch.material_batch_id, 'depleted');
                    row.dataset.status = updated.status;
                    statusSpan.textContent = BATCH_STATUS_LABELS_RU[updated.status] || updated.status;
                    writeOffBtn.remove();
                  } catch (err) {
                    alert(err.message);
                  }
                };

                row.appendChild(writeOffBtn);

                // 🗑 Delete batch (POST-created)
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '🗑';
                deleteBtn.title = 'Удалить партию';

                deleteBtn.onclick = async (e) => {
                  e.preventDefault();
                  e.stopPropagation();

                  const ok = confirm(
                    'Удалить партию?\nЭто действие нельзя отменить.'
                  );
                  if (!ok) return;

                  try {
                    await deleteBatch(newBatch.material_batch_id);
                    row.remove();
                  } catch (err) {
                    alert(err.message);
                  }
                };

                row.appendChild(deleteBtn);
              }

              batchList.prepend(row);
              
              // reset UI
              batchForm.reset();
              batchForm.hidden = true;
              addBatchBtn.hidden = false;
            } catch (err) {
              alert(err.message);
            }
          });
          
          // assemble
          detailsBody.appendChild(batchList);
          detailsBody.appendChild(addBatchBtn);
          detailsBody.appendChild(batchForm);

          let batchesLoaded = false;

          details.addEventListener('toggle', async () => {
            if (!details.open || batchesLoaded) return;

            try {
              const batches = await fetchBatches(m.material_id);
              batchList.innerHTML = '';

              if (batches.length === 0) {
                const empty = document.createElement('li');
                empty.textContent = 'Партий пока нет';
                empty.className = 'muted';
                batchList.appendChild(empty);
              } else {
                batches.forEach(b => {
                  const row = document.createElement('li');
                  row.className = 'batch-row';
                  row.dataset.status = b.status;

                  const codeSpan = document.createElement('span');
                  codeSpan.textContent = b.batch_code;

                  const lotSpan = document.createElement('span');
                  lotSpan.textContent = b.supplier_lot || '';

                  const statusSpan = document.createElement('span');
                  statusSpan.textContent = BATCH_STATUS_LABELS_RU[b.status] || b.status;

                  const dateSpan = document.createElement('span');
                  dateSpan.textContent = b.received_at ? b.received_at.slice(0, 10) : '';

                  row.appendChild(codeSpan);
                  row.appendChild(lotSpan);
                  row.appendChild(statusSpan);
                  row.appendChild(dateSpan);

                  if (b.passport_file) {
                    const link = document.createElement('a');
                    link.href = b.passport_file;
                    link.textContent = '📎 паспорт';
                    link.target = '_blank';
                    link.rel = 'noopener';

                    row.appendChild(link);
                  }

                  // ✅ INSERTED HERE: status change button (GET rows)
                  if (b.status === 'available') {
                    const writeOffBtn = document.createElement('button');
                    writeOffBtn.type = 'button';
                    writeOffBtn.textContent = 'Списать';

                    writeOffBtn.onclick = async (e) => {
                      e.preventDefault();
                      e.stopPropagation();

                      const ok = confirm(
                        'Списать партию?\nЭто действие нельзя отменить.'
                      );
                      if (!ok) return;

                      try {
                        const updated = await updateBatchStatus(b.material_batch_id, 'depleted');
                        row.dataset.status = updated.status;
                        statusSpan.textContent = BATCH_STATUS_LABELS_RU[updated.status] || updated.status;
                        writeOffBtn.remove();
                      } catch (err) {
                        alert(err.message);
                      }
                    };

                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '🗑';
                    deleteBtn.title = 'Удалить партию';

                    deleteBtn.onclick = async (e) => {
                      e.preventDefault();
                      e.stopPropagation();

                      const ok = confirm(
                        'Удалить партию?\nЭто действие нельзя отменить.'
                      );
                      if (!ok) return;

                      try {
                        await deleteBatch(b.material_batch_id);
                        row.remove();
                      } catch (err) {
                        alert(err.message);
                      }
                    };

                    row.appendChild(writeOffBtn);
                    row.appendChild(deleteBtn);
                  }

                  batchList.appendChild(row);
                });
              }

              batchesLoaded = true;
            } catch (err) {
              batchList.innerHTML = '<li class="error">Ошибка загрузки партий</li>';
            }
          });
          

          /* ---------- ASSEMBLY ---------- */

          details.appendChild(summary);
          details.appendChild(detailsBody);

          li.appendChild(details);
          materialsList.appendChild(li);
        });
      }

      function duplicateMaterial(mat) {
        mode = 'create';
        currentId = null;

        showForm();

        // title + name
        const copyName = mat.name + ' (копия)';
        title.textContent = copyName;
        nameInput.value = copyName;

        // Populate form with DB values (apply defaults for NULLs)
        form.elements['created_by'].value = mat.created_by || '';
        form.elements['supplier'].value = mat.supplier || '';
        form.elements['brand'].value = mat.brand || '';
        form.elements['default_role'].value = mat.default_role || 'active';
        form.elements['exclude_from_composition'].value = mat.exclude_from_composition ? 'true' : 'false';
        form.elements['comments'].value = mat.comments || '';

        // IMPORTANT: reset things that must be new
        createdBySelect.value = '';
      }  


      // -------- Status helper --------

      const statusBox = document.querySelector('.status-feedback');

      function showStatus(msg, isError = false) {
        statusBox.textContent = msg;
        statusBox.style.color = isError ? '#b00020' : 'darkcyan';

        setTimeout(() => {
          statusBox.textContent = '';
        }, 1000);
      }


      // -------- Reference dropdowns --------

      async function loadUsers() {
        const prevCreated = createdBySelect.value;

        const res = await fetch('/api/users');
        const users = await res.json();

        createdBySelect.innerHTML = '<option value="">— выбрать пользователя —</option>';

        users.filter(u => u.active).forEach(u => {
          const o1 = new Option(u.name, u.user_id);
          createdBySelect.add(o1);
        });

        createdBySelect.value = prevCreated;    
      }

      // Refresh reference dropdowns on focus
      createdBySelect.addEventListener('focus', loadUsers);    


      // -------- Events --------

      addInput.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;

        e.preventDefault();

        if (!form.hidden) return;   // prevent double-create

        const name = addInput.value.trim();
        if (!name) return;

        mode = 'create';
        currentId = null;

        title.textContent = name;
        nameInput.value = name;

        showForm();

        addInput.value = '';
      });

      function validateRequiredFields() {
          let missing = [];

          // clear previous highlights
          createdBySelect.classList.remove('required-missing');

          if (!createdBySelect.value) {
            missing.push('Кто добавил');
            createdBySelect.classList.add('required-missing');
          }

          if (missing.length) {
            showStatus(
              'Заполните обязательные поля: ' + missing.join(', '),
              true
            );
            return false;
          }

          return true;
        }

      saveBtn.addEventListener('click', async () => {
        if (!mode) return;

        if (!validateRequiredFields()) return;

        const data = formDataToObject(form);
        data.name = title.textContent;

        try {
            if (mode === 'create') {
              await createMaterial(data);
              showStatus('Материал сохранён');
            }

            if (mode === 'edit') {
              await updateMaterial(currentId, data);
              showStatus('Изменения сохранены');
            }

            resetForm();
            loadMaterials(); //refresh list
          } catch (err) {
            showStatus(err.message, true)
          }
      });

      clearBtn.addEventListener('click', resetForm);

      // ------ name: editable ------
      title.addEventListener('click', () => {
        nameInput.hidden = false;
        title.hidden = true;
        nameInput.focus();
      });

      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          nameInput.blur();
        }
      });

      nameInput.addEventListener('blur', () => {
        const val = nameInput.value.trim();
        if (!val) return;

        title.textContent = val;
        title.hidden = false;
        nameInput.hidden = true;
      });


      // -------- Init --------

      async function loadMaterials() {
        const materials = await fetchMaterials();
        renderMaterials(materials);
      }

      hideForm();
      loadUsers();
      loadMaterials();

    </script>
  </body>
</html>
