<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta 
      name="viewport" 
      content="width=device-width, initial-scale=1.0" 
    />
    <title>Materials</title>
    <link rel="stylesheet" type="text/css" href="reference-styles.css">
    
    <style>
      details > summary {
        list-style: none; /* remove default marker */
        cursor: pointer;
        position: relative;
      }

      details > summary::before {
        content: "▸";
        display: inline-block;
        margin-right: 0.5rem;
        transition: transform 0.15s ease;
        color: #666;
      }

      details[open] > summary::before {
        transform: rotate(90deg);
      }

      details[open] > summary {
        background-color: #f6f7f8;
      }

      .instance-row[data-status="depleted"],
      .instance-row[data-status="scrap"] {
        opacity: 0.6;
      }

    </style>
  </head>

  <body data-page="materials">
    <header>
      <h1>Материалы</h1>
      <a href="../index.html"><svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M3 11l9-8 9 8v9a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z" fill="currentColor"/></svg>
      </a>    
    </header>

    <form name="material-form" autocomplete="off" >
      <section class="material-create">
        <h2>Добавить материал</h2>

        <input
          type="text"
          id="new-material-name"
          placeholder="Название материала"
          required
        >

        <select id="new-material-role" required>
          <option value="">— выбрать роль —</option>
          <option value="cathode_active">катодный активный материал</option>
          <option value="anode_active">анодный активный материал</option>
          <option value="binder">связующее</option>
          <option value="conductive_additive">проводящая добавка</option>
          <option value="solvent">растворитель</option>
          <option value="other">другое</option>
        </select>

        <button id="createMaterialBtn" type="button">
          Добавить
        </button>
      </section>
    </form>
    
    <div class="status-feedback" aria-live="polite"></div>
    <ul id="materialsList" class="users-list"></ul>

    <script>

      // -------- State and helpers --------
      
      const newNameInput = document.getElementById('new-material-name');
      const newRoleSelect = document.getElementById('new-material-role');
      const createMaterialBtn = document.getElementById('createMaterialBtn');

      const materialsList = document.getElementById('materialsList');
      let editingMaterialId = null;

      
      // -------- API --------

      async function fetchMaterials() {
        const res = await fetch('/api/materials');
        if (!res.ok) throw new Error('Ошибка загрузки материалов');
        return res.json();
      }

      async function createMaterial(data) {
        const res = await fetch('/api/materials', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка создания');
        }

        return res.json();
      }

      async function updateMaterial(id, data) {
        const res = await fetch(`/api/materials/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка обновления');
        }

        return res.json();
      }

      async function deleteMaterial(id) {
        const res = await fetch(`/api/materials/${id}`, {
          method: 'DELETE'
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка удаления');
        }
      }

      async function fetchInstances(materialId) {
        const res = await fetch(`/api/materials/${materialId}/instances`);
        if (!res.ok) throw new Error('Ошибка загрузки экземпляров');
        return res.json();
      }

      async function createInstance(materialId, data) {
        const res = await fetch(`/api/materials/${materialId}/instances`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка создания экземпляра');
        }

        return res.json();
      }

      async function updateInstance(id, data) {
        const res = await fetch(`/api/material-instances/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка обновления экземпляра');
        }

        return res.json();
      }

      async function deleteInstance(id) {
        const res = await fetch(`/api/material-instances/${id}`, {
          method: 'DELETE'
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Ошибка удаления экземпляра');
        }
      }

      createMaterialBtn.addEventListener('click', async () => {
        const name = newNameInput.value.trim();
        const role = newRoleSelect.value;

        if (!name) {
          alert('Название обязательно');
          return;
        }

        if (!role) {
          alert('Роль обязательна');
          return;
        }

        try {
          if (editingMaterialId) {
            await updateMaterial(editingMaterialId, { name, role });
            editingMaterialId = null;
            createMaterialBtn.textContent = 'Добавить';
          } else {
            await createMaterial({ name, role });
          }

          newNameInput.value = '';
          newRoleSelect.value = '';
          loadMaterials();
        } catch (err) {
          alert(err.message);
        }
      });

      function buildInstanceRow(inst, materialId) {
        const row = document.createElement('li');
        row.className = 'instance-row';

        const supplier = document.createElement('span');
        supplier.textContent = inst.supplier || '';

        const brand = document.createElement('span');
        brand.textContent = inst.brand || '';

        const batch = document.createElement('span');
        batch.textContent = inst.batch || '';

        row.appendChild(supplier);
        row.appendChild(brand);
        row.appendChild(batch);

        if (inst.file_path) {
          const link = document.createElement('a');
          link.href = inst.file_path;
          link.textContent = '📎 файл';
          link.target = '_blank';
          link.rel = 'noopener';
          row.appendChild(link);
        }

        const actions = document.createElement('span');
        actions.className = 'actions';

        const editBtn = document.createElement('button');
        editBtn.textContent = '✏️';
        editBtn.onclick = async (e) => {
          e.preventDefault();
          e.stopPropagation();

          try {
            const updated = await updateInstance(inst.material_instance_id, {
              supplier: supplierVal,
              brand: brandVal,
              batch: batchVal,
              notes: inst.notes,
              file_path: inst.file_path
            });

            row.replaceWith(buildInstanceRow(updated, materialId));
          } catch (err) {
            alert(err.message);
          }
        };

        const duplicateBtn = document.createElement('button');
        duplicateBtn.textContent = '📄';
        duplicateBtn.onclick = async (e) => {
          e.preventDefault();
          e.stopPropagation();

          try {
            const copy = await createInstance(materialId, {
              supplier: inst.supplier,
              brand: inst.brand,
              batch: inst.batch,
              notes: inst.notes,
              file_path: inst.file_path
            });

            row.parentElement.prepend(buildInstanceRow(copy, materialId));
          } catch (err) {
            alert(err.message);
          }
        };

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = '🗑';
        deleteBtn.onclick = async (e) => {
          e.preventDefault();
          e.stopPropagation();

          if (!confirm('Удалить экземпляр?')) return;

          try {
            await deleteInstance(inst.material_instance_id);
            row.remove();
          } catch (err) {
            alert(err.message);
          }
        };

        actions.appendChild(editBtn);
        actions.appendChild(duplicateBtn);
        actions.appendChild(deleteBtn);

        row.appendChild(actions);

        return row;
      }

      function renderMaterials(materials) {
        materialsList.innerHTML = '';

        materials.forEach(m => {
          const li = document.createElement('li');
          const details = document.createElement('details');
          const summary = document.createElement('summary');

          const info = document.createElement('span');
          info.className = 'material-summary-info';

          const nameSpan = document.createElement('span');
          nameSpan.textContent = m.name;
          nameSpan.style="display:inline-block; width:12vw;"

          const roleSpan = document.createElement('span');
          const roleMap = {
            cathode_active: 'катодный активный материал',
            anode_active: 'анодный активный материал',
            binder: 'связующее',
            conductive_additive: 'проводящая добавка',
            solvent: 'растворитель',
            other: 'другое'
          };
          roleSpan.textContent = roleMap[m.role] || m.role;
          roleSpan.style="display:inline-block; width:25vw;"

          info.appendChild(nameSpan);
          info.appendChild(roleSpan);

          const actions = document.createElement('span');
          actions.className = 'actions';

          const editBtn = document.createElement('button');
          editBtn.textContent = '✏️';
          editBtn.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();

            newNameInput.value = m.name;
            newRoleSelect.value = m.role;
            editingMaterialId = m.material_id;
            createMaterialBtn.textContent = 'Сохранить';
            newNameInput.focus();
          };


          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = '🗑';
          deleteBtn.onclick = async (e) => {
            e.preventDefault();
            e.stopPropagation();

            if (!confirm(`Удалить материал "${m.name}"?`)) return;

            try {
              await deleteMaterial(m.material_id);
              loadMaterials();
            } catch (err) {
              alert(err.message);
            }
          };

          actions.appendChild(editBtn);
          actions.appendChild(deleteBtn);

          summary.appendChild(info);
          summary.appendChild(actions);

          const body = document.createElement('div');
          const instanceList = document.createElement('ul');

          const addBtn = document.createElement('button');
          addBtn.textContent = '+ Добавить экземпляр';
          addBtn.type = 'button';

          const form = document.createElement('form');
          form.hidden = true;

          form.innerHTML = `
            <input type="text" name="supplier" placeholder="Поставщик">
            <input type="text" name="brand" placeholder="Бренд">
            <input type="text" name="batch" placeholder="Номер партии">
            <input type="url" name="file_path" placeholder="Ссылка на файл">
            <button type="button" class="save">Сохранить</button>
            <button type="button" class="cancel">Отмена</button>
          `;

          addBtn.onclick = () => {
            form.hidden = false;
            addBtn.hidden = true;
          };

          form.addEventListener('click', async (e) => {
            if (e.target.classList.contains('cancel')) {
              form.reset();
              form.hidden = true;
              addBtn.hidden = false;
              return;
            }

            if (!e.target.classList.contains('save')) return;

            const data = Object.fromEntries(new FormData(form).entries());

            if (!data.supplier && !data.brand && !data.batch) {
              alert('Заполните хотя бы одно поле');
              return;
            }

            try {
              const inst = await createInstance(m.material_id, data);
              instanceList.prepend(buildInstanceRow(inst, m.material_id));
              form.reset();
              form.hidden = true;
              addBtn.hidden = false;
            } catch (err) {
              alert(err.message);
            }
          });

          details.addEventListener('toggle', async () => {
            if (!details.open) return;

            const instances = await fetchInstances(m.material_id);
            instanceList.innerHTML = '';

            if (!instances.length) {
              const empty = document.createElement('li');
              empty.textContent = 'Экземпляров пока нет';
              instanceList.appendChild(empty);
            } else {
              instances.forEach(inst => {
                instanceList.appendChild(buildInstanceRow(inst, m.material_id));
              });
            }
          });

          body.appendChild(instanceList);
          body.appendChild(addBtn);
          body.appendChild(form);

          details.appendChild(summary);
          details.appendChild(body);
          li.appendChild(details);
          materialsList.appendChild(li);
        });
      }

      // -------- Init --------

      async function loadMaterials() {
        const materials = await fetchMaterials();
        renderMaterials(materials);
      }


      loadMaterials();

    </script>
  </body>
</html>
