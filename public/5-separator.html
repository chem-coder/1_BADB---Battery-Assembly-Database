<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
       name="viewport"
       content="width=device-width, initial-scale=1.0" />
    <title>Данные из паспорта сепаратора: </title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script type="text/javascript" src="script.js" defer></script>
  </head>

  <body data-page="separator">
    <div class="container">
      <header>
        <h1>Сепаратор</h1>
        <nav class="menu">
          <ul>
            <li>
              <!-- Navigation button without text -->
              <a href="index.html" target="_blank"><svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M3 11l9-8 9 8v9a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z"
                      fill="currentColor"/>
              </svg></a>
            </li>
            <li><a href="1-BAL.html" target="_blank">Протокол сборки аккумулятора</a></li>
            <li><a href="2-cathode.html" target="_blank">Катод</a></li>
            <li><a href="3-anode.html" target="_blank">Анод</a></li>
            <li><a href="4-electrolyte.html" target="_blank">Электролит</a></li>
          </ul>
        </nav>
      </header>
      

      <form name="separator-form" autocomplete="on">
        <button id="saveBtn" type="button">Сохранить файл</button>
        <button id="loadBtn" type="button">Загрузить файл</button>
        <button id="clearBtn" type="button">Очистить форму</button><br>
        
        <p id="loaded-file-container" class="loaded-file-label" style="display:none;">
          Файл: <span id="loaded-file-name"></span>
        </p>

        <fieldset id="separator-intro">
          <label for="project-name">Название проекта: </label>
          <input id="project-name" type="text" name="project-name" placeholder="Какому проекту принадлежит?" value="" /><br>
          <!--N O T E: form fields must have a "name" attribute to be included in the FormData object. Otherwise, they're skipped: the "id" property doesn't count. */-->

          <label for="separator-name">Сепаратор - название/код: </label>
          <input id="separator-name" type="text" name="separator-name" placeholder="Celgard 2320" required><br>

          <label for="separator-batch">Сепаратор - партия: </label>
          <input id="separator-batch" type="text" name="separator-batch" placeholder="A1" required><br>

          <label for="separator-notes">Сепаратор - заметки/комментарии: </label>
          <textarea id="separator-notes" name="separator-notes" placeholder="Общие комментарии о сепараторе"></textarea>
        </fieldset>

        <fieldset id="separator-properties">
          <legend>Паспортные характеристики сепаратора</legend>

          <label for="separator-material">Материал: </label>
          <input
            id="separator-material"
            type="text"
            name="separator-material"
            placeholder="PE, PP, керамический, композитный и т.п."
          /><br>

          <label for="separator-layers">Число слоёв (структура): </label>
          <select id="separator-layers" name="separator-layers">
            <option value="">Выберите вариант</option>
            <option value="mono">Монослойный</option>
            <option value="bi">Двухслойный</option>
            <option value="tri">Трёхслойный</option>
            <option value="other">Другое</option>
          </select><br>

          <label for="separator-air-permeability">Воздушная проницаемость: </label>
          <input
            id="separator-air-permeability"
            type="number"
            step="0.01"
            min="0"
            name="separator-air-permeability"
            placeholder="например, 200"
          />
          <span> s/100 мл или др. единицы (указать в комментариях)</span><br>

          <label for="separator-thickness">Толщина: </label>
          <input
            id="separator-thickness"
            type="number"
            step="0.01"
            min="0"
            name="separator-thickness"
            placeholder="например, 20"
          />
          <span> мкм</span><br>

          <label for="separator-porosity">Пористость: </label>
          <input
            id="separator-porosity"
            type="number"
            step="0.1"
            min="0"
            max="100"
            name="separator-porosity"
            placeholder="например, 40"
          />
          <span> %</span><br>

          <label for="separator-spec-notes">Комментарии к паспорту: </label><br>
          <textarea
            id="separator-spec-notes"
            name="separator-spec-notes"
            rows="3"
            cols="50"
            placeholder="Единицы измерения, методики (Гурли и т.п.), особые замечания"
          ></textarea>
        </fieldset>

      </form>
      <p>Test output: <span id="test-output"></span></p>
      <div class="autosave-message" aria-live="polite"></div>
    </div>
  </body>
</html>
