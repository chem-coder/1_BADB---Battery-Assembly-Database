<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Печатный отчёт по партии электродов</title>
    <link rel="stylesheet" type="text/css" href="/css/styles.css">
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #fff;
        color: #222;
      }

      .print_report {
        max-width: 860px;
        margin: 0 auto;
        padding: 18px 22px 36px;
      }

      .report_actions {
        display: flex;
        gap: 10px;
        margin-bottom: 18px;
      }

      .report_title {
        margin: 0 0 2px;
        font-size: 14px;
        font-weight: 600;
        color: #666;
        letter-spacing: 0.02em;
      }

      .report_subtitle {
        margin: 0 0 10px;
        font-size: 28px;
        font-weight: 700;
        color: #222;
      }

      .report_meta {
        margin: 0 0 18px;
        color: #444;
        font-size: 13px;
      }

      .report_section {
        margin-top: 18px;
        page-break-inside: avoid;
      }

      .report_section h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .report_subsection {
        margin-top: 12px;
      }

      .report_subsection h3 {
        margin: 0 0 6px;
        font-size: 16px;
      }

      .report_row {
        margin: 2px 0;
        line-height: 1.38;
      }

      .report_compact {
        margin: 2px 0;
        line-height: 1.45;
        color: #222;
      }

      .report_table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        font-size: 13px;
      }

      .report_table th,
      .report_table td {
        border: 1px solid #cfcfcf;
        padding: 5px 7px;
        text-align: left;
        vertical-align: top;
      }

      .report_table th {
        background: #f7f7f7;
      }

      .report_dual_grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px 16px;
        margin-top: 8px;
      }

      .report_dual_metric {
        border: 1px solid #e4e7ee;
        border-radius: 8px;
        padding: 8px 10px;
        background: #fafbfd;
      }

      .report_dual_label {
        margin-bottom: 3px;
        color: #5f6775;
        font-size: 12px;
      }

      .report_dual_primary {
        font-weight: 700;
        color: #233044;
        line-height: 1.35;
      }

      .report_dual_secondary {
        margin-top: 1px;
        color: #758094;
        font-size: 12px;
        line-height: 1.35;
      }

      .muted {
        color: #666;
      }

      .comment_block {
        margin-top: 10px;
      }

      .comment_label {
        display: block;
        margin-bottom: 2px;
        color: #555;
        font-weight: 600;
      }

      .comment_text {
        white-space: pre-wrap;
        line-height: 1.45;
      }

      @media print {
        .report_actions {
          display: none;
        }

        .print_report {
          max-width: none;
          padding: 0;
        }

        a {
          color: inherit;
          text-decoration: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="print_report">
      <div class="report_actions">
        <button type="button" id="printReportBtn">Печать</button>
        <button type="button" id="closeReportBtn">Закрыть</button>
      </div>

      <div id="reportRoot">
        <p class="muted">Загрузка отчёта…</p>
      </div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/electrode-batch-print.js"></script>
  </body>
</html>
